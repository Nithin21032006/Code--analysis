name: code-review-assistant
version: 1.0.0
description: OpenEnv-compliant RL environment for code review

environment:
  module: env.environment  # CRITICAL: env.environment not just environment
  class: CodeReviewEnv

tasks:
  - id: "easy"
    grader: "env.graders:grade_easy"  # CRITICAL: env.graders:function_name
    name: "Syntax Error Detection"
    description: "The code has missing parentheses. Identify the syntax error."
    difficulty: "easy"
    
  - id: "medium"
    grader: "env.graders:grade_medium"
    name: "Runtime Bug Detection"
    description: "Array index goes out of bounds. Detect the runtime error."
    difficulty: "medium"
    
  - id: "hard"
    grader: "env.graders:grade_hard"
    name: "Security Vulnerability Detection"
    description: "SQL injection vulnerability. Identify the security issue."
    difficulty: "hard"