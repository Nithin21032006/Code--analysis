name: code-review-assistant
version: 1.0.0
description: Code review environment with 3 tasks

tasks:
  - id: "easy"
    grader: "graders:grade_easy"
    name: "Syntax Error Detection"
    description: "The code has missing parentheses. The agent must identify the syntax error."
    difficulty: "easy"
    
  - id: "medium"
    grader: "graders:grade_medium"
    name: "Runtime Bug Detection"
    description: "The array index goes out of bounds. The agent must detect the runtime error."
    difficulty: "medium"
    
  - id: "hard"
    grader: "graders:grade_hard"
    name: "Security Vulnerability Detection"
    description: "The query is vulnerable to SQL injection. The agent must identify the security issue."
    difficulty: "hard"

environment:
  module: environment
  class: CodeReviewEnv
