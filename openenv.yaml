name: code-review-assistant
version: 1.0.0
description: Code review environment with 3 tasks

tasks:
  - id: easy
    name: Syntax Error Detection
    difficulty: easy
    grader: easy
    
  - id: medium
    name: Runtime Bug Detection
    difficulty: medium
    grader: medium
    
  - id: hard
    name: Security Vulnerability Detection
    difficulty: hard
    grader: hard

environment:
  class: CodeReviewEnv
  module: environment
